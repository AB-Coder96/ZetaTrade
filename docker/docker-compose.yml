version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: zetaforge
      POSTGRES_USER: zetaforge
      POSTGRES_DB: zetaforge
    ports:
      - "5432:5432"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro

  zetaforge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - timescaledb
    environment:
      ZF_DB_HOST: timescaledb
      ZF_DB_PORT: "5432"
      ZF_DB_USER: zetaforge
      ZF_DB_PASSWORD: zetaforge
      ZF_DB_NAME: zetaforge
    command: ["/app/Zetaforge_bench", "--config", "/app/configs/bench.yaml", "--out", "/app/out/bench.csv"]
    volumes:
      - ../out:/app/out
